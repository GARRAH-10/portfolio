<main>

<form action="#" method="post" style="border:2px solid black; padding:10px;">

<fieldset>
<legend>Info</legend>

<label>Name:</label>
<input type="text" required style="padding:5px;"><br>

<label>Email:</label>
<input type="email" required><br>

<label>Phone:</label>
<input type="tel"><br>

<label>Age:</label>
<input type="number" min="1" max="100"><br>

<label>Date:</label>
<input type="date"><br>

</fieldset>

<fieldset>
<legend>Message</legend>

<select>
<option>General</option>
<option>Project</option>
</select>

<input type="range" min="1" max="10"><br>

<input type="radio" name="g">Male
<input type="radio" name="g">Female
<input type="radio" name="g">Other

<br>

<input type="checkbox">Web
<input type="checkbox">Apps
<input type="checkbox">AI

<br>

<textarea style="background-color:lightyellow;"></textarea>

</fieldset>

<button type="submit">Send</button>

</form>
